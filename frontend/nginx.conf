server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy
    location /api/ {
        # DNS resolver for dynamic upstream resolution (Docker DNS + public fallback)
        resolver 127.0.0.11 8.8.8.8 valid=30s ipv6=off;

        # Use variable to force runtime DNS resolution
        set $backend ${BACKEND_URL};
        proxy_pass $backend;
        proxy_http_version 1.1;

        # Send backend's own hostname (not frontend's) so Azure accepts the request
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Enable SNI for HTTPS upstream
        proxy_ssl_server_name on;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # Health check endpoint
    location /health {
        return 200 '{"status":"healthy","service":"ai-coach-frontend"}';
        add_header Content-Type application/json;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
