name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Unit tests
        run: |
          pytest tests/ -v \
            --junitxml=test-results/junit.xml \
            --html=test-results/report.html \
            --self-contained-html \
            --cov=app \
            --cov-report=html:test-results/coverage \
            --cov-report=xml:test-results/coverage.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results/

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type check
        run: npx tsc -b
      - name: Build
        run: npm run build

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & Push Backend Image
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image ai-coach-backend:${{ github.sha }} \
            --image ai-coach-backend:latest \
            --file backend/Dockerfile \
            backend/

      - name: Deploy Backend
        run: |
          az containerapp update \
            --name ai-coach-backend \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/ai-coach-backend:${{ github.sha }}

      - name: Get Backend FQDN
        id: backend-fqdn
        run: |
          FQDN=$(az containerapp show \
            --name ai-coach-backend \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "fqdn=$FQDN" >> "$GITHUB_OUTPUT"

      - name: Build & Push Frontend Image
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image ai-coach-frontend:${{ github.sha }} \
            --image ai-coach-frontend:latest \
            --build-arg VITE_API_BASE_URL=https://${{ steps.backend-fqdn.outputs.fqdn }} \
            --file frontend/Dockerfile \
            frontend/

      - name: Deploy Frontend
        run: |
          az containerapp update \
            --name ai-coach-frontend \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/ai-coach-frontend:${{ github.sha }} \
            --set-env-vars "BACKEND_URL=https://${{ steps.backend-fqdn.outputs.fqdn }}"

      - name: Verify Deployment
        run: |
          FRONTEND_FQDN=$(az containerapp show \
            --name ai-coach-frontend \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "Frontend URL: https://$FRONTEND_FQDN"
          echo "Backend URL: https://${{ steps.backend-fqdn.outputs.fqdn }}"
          for i in $(seq 1 10); do
            if curl -sf "https://${{ steps.backend-fqdn.outputs.fqdn }}/api/health" > /dev/null; then
              echo "Backend health check passed"
              break
            fi
            echo "Attempt $i/10 - waiting 10s..."
            sleep 10
          done
