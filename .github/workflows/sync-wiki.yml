name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - "docs/**"
      - "CLAUDE.md"
      - "README.md"
      - "backend/app/api/**"
      - "backend/app/models/**"
      - "backend/tests/**"
      - "frontend/src/pages/**"
      - "frontend/src/components/**"
      - "frontend/e2e/**"

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate wiki stats
        run: bash .github/scripts/generate-wiki-pages.sh

      - name: Sync to GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${GITHUB_REPOSITORY}"
          WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.wiki.git"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          WIKI_DIR=$(mktemp -d)

          if git clone "$WIKI_URL" "$WIKI_DIR" 2>/dev/null; then
            echo "Wiki repo cloned successfully"
          else
            echo "Wiki not initialized yet — creating first page"
            cd "$WIKI_DIR"
            git init
            git remote add origin "$WIKI_URL"
            echo "# Wiki" > Home.md
            git add . && git commit -m "Initialize wiki"
            git push -u origin HEAD:master || git push -u origin HEAD:main
            cd -
          fi

          cp wiki/*.md "$WIKI_DIR/"

          cd "$WIKI_DIR"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to sync"
          else
            git commit -m "Auto-sync wiki from main branch [skip ci]"
            git push
            echo "Wiki synced successfully"
          fi
